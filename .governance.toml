schema = "agent_harness.governance.v1"
doc_roots = [
    "README.md",
    "docs",
    "schemas",
    ".agents/skills",
    "examples",
    "apps",
]
skill_roots = [
    "skills",
    ".agents/skills",
]
max_lines = 500
member_data_root = ".agents/data"

[registry]
path = "docs/registry.json"
schema = "agent_harness.docs_registry.v1"
required_fields = [
    "path",
    "ownerRole",
    "status",
    "lifecycle",
    "authorityClass",
    "implementationState",
    "truthRefs",
    "canonicalFor",
    "dependsOn",
    "machineConsumers",
    "reviewAfter",
    "lastVerifiedWith",
    "reorgTrigger",
]
allowed_statuses = [
    "idea",
    "planned",
    "stable",
    "deprecated",
    "archival",
]
allowed_lifecycles = [
    "volatile",
    "stable",
    "archival",
]
allowed_authority_classes = [
    "entry",
    "canonical_contract",
    "implementation_reference",
    "design_intent",
    "actual_evidence",
    "research",
    "historical_evidence",
]
allowed_implementation_states = [
    "design_only",
    "partial",
    "implemented",
    "verified",
]
allowed_truth_ref_kinds = [
    "schema",
    "store",
    "api",
    "ui",
    "test",
    "decision",
    "runtime_evidence",
]
core_docs = [
    "README.md",
    "docs/README.md",
    "docs/documentation-governance.md",
    "docs/prd.md",
    "docs/design-basis.md",
    "docs/architecture.md",
    "docs/operations.md",
    "docs/schemas.md",
    "docs/decisions/README.md",
    "docs/company-os/product-system-map.md",
]
coverage_roots = [
    "docs/company-os",
    "docs/dashboard/pages",
    "docs/integration",
]
coverage_exclude = []

[retired_vocabulary]
terms = [
    "Goal System",
    "Task System",
    "Goal -> Task",
    "Vision/Goal/Task",
    "Goal/Task Workbench",
]
allowed_paths = [
    "docs/governance-engine.md",
]
context_markers = [
    "archive",
    "archived",
    "compatibility",
    "deprecated",
    "former",
    "historical",
    "legacy",
    "migration",
    "not active",
    "retired",
    "superseded",
]
