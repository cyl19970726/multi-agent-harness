name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm check
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      # Doc/skill governance gate, native in the binary (replaces the retired
      # node check-doc-*/check-skills scripts). The cargo-test self-host test
      # also covers this; this is the explicit, legible CLI gate.
      - run: cargo run -q -p harness-cli -- governance check
