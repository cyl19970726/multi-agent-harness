interface:
  display_name: "Author Workflow"
  short_description: "Write a JSON WorkflowSpec and run it with harness workflow run-spec."
  default_prompt: "Author a valid WorkflowSpec JSON-IR for the requested orchestration (each agent node names a provider: codex or claude, and parallel file-editing nodes use isolation: worktree), validate it against schemas/workflow-spec.schema.json, run it with `harness workflow run-spec <spec.json>`, then read the run back from the dashboard snapshot or store."
