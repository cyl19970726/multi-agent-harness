<svg viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img">
<title>Core closed loop + self-improvement flywheel</title>
<desc>observe to propose to design+plan to run phases to verdict to evaluate to next; on fail auto-optimise inserts a remediation phase; on pass Building phases run skill/doc/self-improve.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text x="12" y="20" font-size="12" fill="#656d76">solid = exists today · blue = your proposed additions · dashed = still a stub today</text>

<g font-size="13" fill="#1f2328">
<rect x="230" y="36" width="220" height="46" rx="7" fill="#ffffff" stroke="#656d76" stroke-width="1.2" stroke-dasharray="4 3"/>
<text x="340" y="56" text-anchor="middle">observe</text><text x="340" y="73" text-anchor="middle" font-size="11" fill="#656d76">scan repo/CI/metrics, propose goal (stub)</text>

<rect x="230" y="100" width="220" height="46" rx="7" fill="#ffffff" stroke="#656d76" stroke-width="1.2" stroke-dasharray="4 3"/>
<text x="340" y="120" text-anchor="middle">propose goal</text><text x="340" y="137" text-anchor="middle" font-size="11" fill="#656d76">human opens it today (stub)</text>

<rect x="230" y="164" width="220" height="46" rx="7" fill="#ffffff" stroke="#d0d7de" stroke-width="1.2"/>
<text x="340" y="184" text-anchor="middle">design + plan</text><text x="340" y="201" text-anchor="middle" font-size="11" fill="#656d76">knowledge to phases + task DAG</text>

<rect x="230" y="228" width="220" height="46" rx="7" fill="#ffffff" stroke="#d0d7de" stroke-width="1.2"/>
<text x="340" y="248" text-anchor="middle">run phases</text><text x="340" y="265" text-anchor="middle" font-size="11" fill="#656d76">execute per phase + worktree land</text>

<rect x="230" y="292" width="220" height="46" rx="7" fill="#ffffff" stroke="#2563eb" stroke-width="1.6"/>
<text x="340" y="312" text-anchor="middle">verdict</text><text x="340" y="329" text-anchor="middle" font-size="11" fill="#2563eb">Evaluator (new)</text>

<rect x="230" y="438" width="220" height="46" rx="7" fill="#ffffff" stroke="#2563eb" stroke-width="1.6"/>
<text x="340" y="458" text-anchor="middle">evaluate to next goal</text><text x="340" y="475" text-anchor="middle" font-size="11" fill="#2563eb">advanced the vision? next (new)</text>
</g>

<g stroke="#656d76" stroke-width="1.4" fill="none">
<line x1="340" y1="82" x2="340" y2="100" marker-end="url(#arrow)"/>
<line x1="340" y1="146" x2="340" y2="164" marker-end="url(#arrow)"/>
<line x1="340" y1="210" x2="340" y2="228" marker-end="url(#arrow)"/>
<line x1="340" y1="274" x2="340" y2="292" marker-end="url(#arrow)"/>
</g>

<rect x="12" y="292" width="196" height="58" rx="7" fill="#ffffff" stroke="#2563eb" stroke-width="1.6"/>
<text x="20" y="312" font-size="12.5" fill="#2563eb">auto-optimise (new) on fail</text>
<text x="20" y="329" font-size="11" fill="#656d76">read history, locate weak plan</text>
<text x="20" y="344" font-size="11" fill="#656d76">insert remediation phase, rerun</text>

<rect x="472" y="292" width="196" height="58" rx="7" fill="#ffffff" stroke="#2563eb" stroke-width="1.6"/>
<text x="480" y="312" font-size="12.5" fill="#2563eb">Building phases (new) on pass</text>
<text x="480" y="329" font-size="11" fill="#656d76">skill extract · doc governance</text>
<text x="480" y="344" font-size="11" fill="#656d76">· self-improve (distil this round)</text>

<g stroke="#2563eb" stroke-width="1.4" fill="none">
<line x1="230" y1="315" x2="210" y2="315" marker-end="url(#arrow)"/>
<line x1="450" y1="315" x2="470" y2="315" marker-end="url(#arrow)"/>
<line x1="340" y1="338" x2="340" y2="438" marker-end="url(#arrow)"/>
<path d="M110 292 L110 252 L228 252" marker-end="url(#arrow)"/>
<path d="M230 461 L150 461 L150 59 L228 59" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
</g>
<text x="222" y="309" font-size="10.5" fill="#656d76">fail</text>
<text x="455" y="309" font-size="10.5" fill="#656d76">pass</text>
<text x="120" y="246" font-size="10.5" fill="#2563eb">dynamic Case grows</text>
<text x="156" y="250" font-size="11" fill="#656d76" transform="rotate(-90 156 250)">loop · next round</text>

<rect x="12" y="506" width="656" height="50" rx="7" fill="#ffffff" stroke="#2563eb" stroke-width="1.2"/>
<text x="22" y="525" font-size="12" fill="#2563eb">Evaluator (new) = JUDGE (efficient?) + GATE (logic closed? falsifiable invariant) + coverage auditor (which closure unguarded?)</text>
<text x="22" y="544" font-size="12" fill="#656d76">then decides whether to distil this round's good practice into a new Skill</text>

<text x="12" y="582" font-size="11.5" fill="#656d76">moat = closed loop + auditable chain: goal -> phase -> task -> workflow -> step -> session -> commit (today broken at workflow -> goal)</text>
</svg>
