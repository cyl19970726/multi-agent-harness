interface:
  display_name: "Author Workflow"
  short_description: "Write a Starlark workflow program and run it with harness workflow run-script."
  default_prompt: "Author a Starlark workflow program for the requested orchestration: declare a mandatory workflow(name, design_intent) header explaining WHY the shape is chosen, then call agent()/parallel()/phase()/log() (each leaf names a provider: codex or claude, and parallel file-editing slots use isolation=\"worktree\"). Use schema={...} on any leaf whose output drives control flow so agent() returns a checkable dict (None on failure), and reach for the quality meta-patterns where they fit — verify+repair+stop, adversarial/perspective-diverse verify, judge panel, loop-until-dry, completeness critic — rather than a naive linear fan-out. A single-step task is just one agent() call, not a workflow. Run it with `harness workflow run-script <prog.star>`, then read the run back from the dashboard snapshot or store."
