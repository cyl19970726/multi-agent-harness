<svg viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img">
<title>Task vs Dynamic Agent Workflow</title>
<desc>Goal to phases to each phase's task DAG is the declarative plan layer; compile_phase_to_starlark compiles one phase's task DAG into a .star Dynamic Agent Workflow run by ephemeral workers.</desc>
<defs><marker id="arw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text x="12" y="18" font-size="13" fill="#1f2328">1. plan layer — Task = WHAT (declared: depends_on + exclusive owned_paths)</text>

<rect x="12" y="32" width="118" height="54" rx="7" fill="#ffffff" stroke="#d0d7de" stroke-width="1.2"/>
<text x="71" y="55" text-anchor="middle" font-size="13" fill="#1f2328">Goal</text>
<text x="71" y="72" text-anchor="middle" font-size="11" fill="#656d76">vision + acceptance</text>

<rect x="158" y="32" width="140" height="54" rx="7" fill="#ffffff" stroke="#d0d7de" stroke-width="1.2"/>
<text x="228" y="55" text-anchor="middle" font-size="13" fill="#1f2328">phases[]</text>
<text x="228" y="72" text-anchor="middle" font-size="11" fill="#656d76">P1 -> P2 -> P3 ordered</text>

<rect x="326" y="28" width="342" height="80" rx="7" fill="#ffffff" stroke="#d0d7de" stroke-width="1.2"/>
<text x="338" y="46" font-size="11.5" fill="#656d76">phase Pk task DAG</text>
<rect x="338" y="56" width="74" height="24" rx="5" fill="#ffffff" stroke="#656d76" stroke-width="1"/>
<text x="375" y="72" text-anchor="middle" font-size="11.5" fill="#1f2328">t1</text>
<rect x="556" y="52" width="100" height="22" rx="5" fill="#ffffff" stroke="#656d76" stroke-width="1"/>
<text x="606" y="67" text-anchor="middle" font-size="11.5" fill="#1f2328">t2</text>
<rect x="556" y="82" width="100" height="22" rx="5" fill="#ffffff" stroke="#656d76" stroke-width="1"/>
<text x="606" y="97" text-anchor="middle" font-size="11.5" fill="#1f2328">t3</text>
<g stroke="#656d76" stroke-width="1.3" fill="none">
<line x1="412" y1="66" x2="556" y2="63" marker-end="url(#arw)"/>
<line x1="412" y1="72" x2="556" y2="92" marker-end="url(#arw)"/>
</g>

<g stroke="#656d76" stroke-width="1.4" fill="none">
<line x1="130" y1="59" x2="158" y2="59" marker-end="url(#arw)"/>
<line x1="298" y1="59" x2="326" y2="59" marker-end="url(#arw)"/>
</g>

<path d="M497 108 L497 134 L168 134 L168 196" stroke="#2563eb" stroke-width="1.7" fill="none" marker-end="url(#arw)"/>
<rect x="250" y="122" width="232" height="24" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="1.3"/>
<text x="366" y="138" text-anchor="middle" font-size="11.5" fill="#2563eb">compile_phase_to_starlark</text>

<text x="12" y="184" font-size="13" fill="#1f2328">2. execution layer (Dynamic Agent Workflows) — Workflow = compiled task DAG (HOW)</text>

<rect x="44" y="196" width="248" height="56" rx="7" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
<text x="168" y="218" text-anchor="middle" font-size="13" fill="#1f2328">Dynamic Agent Workflow (.star)</text>
<text x="168" y="235" text-anchor="middle" font-size="11" fill="#656d76">agent() / parallel() / pipeline()</text>

<rect x="318" y="196" width="186" height="56" rx="7" fill="#ffffff" stroke="#d0d7de" stroke-width="1.2"/>
<text x="411" y="218" text-anchor="middle" font-size="13" fill="#1f2328">ephemeral worker</text>
<text x="411" y="235" text-anchor="middle" font-size="11" fill="#656d76">codex · claude · kimi</text>

<rect x="530" y="196" width="138" height="56" rx="7" fill="#ffffff" stroke="#d0d7de" stroke-width="1.2"/>
<text x="599" y="218" text-anchor="middle" font-size="13" fill="#1f2328">evidence</text>
<text x="599" y="235" text-anchor="middle" font-size="11" fill="#656d76">+ verdict</text>

<g stroke="#656d76" stroke-width="1.4" fill="none">
<line x1="292" y1="224" x2="318" y2="224" marker-end="url(#arw)"/>
<line x1="504" y1="224" x2="530" y2="224" marker-end="url(#arw)"/>
</g>

<text x="12" y="288" font-size="11.5" fill="#656d76">causal trace: goal -> phase -> task -> workflow run -> step -> session -> commit</text>
<text x="12" y="312" font-size="11.5" fill="#2563eb">escape hatch: a hand-written .star bypasses the plan layer -> run has no goal_id -> chain breaks (in the product, a workflow is always a phase's compiled output)</text>
</svg>
