interface:
  display_name: "Author Planner"
  short_description: "Decompose an explored Goal's design into sequential phases + a per-phase task DAG."
  default_prompt: "Plan an explored Goal: decompose its design_md (+ acceptance_md) into an ORDERED list of sequential phases and, within each phase, a task DAG where tasks with disjoint owned_paths and no deps run in parallel. Each task is a mini-goal with its own design_md + acceptance + owned_paths. Use `harness goal plan <goal>` to let the planner write phases + Planned tasks, then `harness phase compile` / `harness goal run-phases` to execute."
